# Cross-org consumer test for the zizmor reusable workflow.
#
# Calls the reusable from the fork. This exercises the real production
# path: a remote workflow_call where the wrapper runs the co-located
# composite action, which reads its bundled pin via github.action_path.
#
# This file is a temporary test harness and is not part of the template.

name: '🌈 Zizmor Reusable (cross-org test)'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:
  zizmor:
    # yamllint disable-line rule:line-length
    uses: modeseven-lfreleng-actions/zizmor-reusable/.github/workflows/reuse-zizmor.yaml@fe54ff015ef22ecf89b3b41dc58ba5d2e1f68a26  # untagged test build
    permissions:
      contents: read
      security-events: write
