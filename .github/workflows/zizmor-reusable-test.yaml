# Cross-org consumer test for the zizmor reusable workflow.
#
# Calls the reusable from the fork and overrides reusable-repository so
# the reusable's self-checkout resolves to the fork rather than the
# canonical lfreleng-actions/zizmor-reusable. This exercises the real
# production path: a remote workflow_call where github.job_workflow_sha
# must resolve to the reusable repository's commit.
#
# This file is a temporary test harness and is not part of the template.

name: '🌈 Zizmor Reusable (cross-org test)'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:
  zizmor:
    # yamllint disable-line rule:line-length
    uses: modeseven-lfreleng-actions/zizmor-reusable/.github/workflows/reuse-zizmor.yaml@93391f69a9f58aa1cf4945991c48e0436f3e7f71  # untagged test build
    permissions:
      contents: read
      security-events: write
    with:
      reusable-repository: 'modeseven-lfreleng-actions/zizmor-reusable'
